name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          git merge-base --is-ancestor HEAD origin/main
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Tag is not on main branch - aborting release"
            exit 1
          }

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Build exe with PyInstaller
        run: |
          uv run pyinstaller --noconfirm --onefile --windowed --name "RtV_LoadOrder_Editor" --icon RtV_LoE.ico --collect-all customtkinter main.py

      - name: Generate SHA256 hash
        run: |
          cd dist
          (Get-FileHash RtV_LoadOrder_Editor.exe -Algorithm SHA256).Hash | Out-File -Encoding ascii RtV_LoadOrder_Editor.exe.sha256
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RtV_LoadOrder_Editor
          path: |
            dist/RtV_LoadOrder_Editor.exe
            dist/RtV_LoadOrder_Editor.exe.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/RtV_LoadOrder_Editor.exe
            dist/RtV_LoadOrder_Editor.exe.sha256
          generate_release_notes: true
